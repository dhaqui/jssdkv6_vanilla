<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayPal JS SDK v6 Vanilla Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 40px;
      color: #172c4d;
    }
    .container { max-width: 760px; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .amount {
      font-size: 18px;
      margin: 16px 0 24px;
    }
    paypal-button[hidden] {
      display: none;
    }
    #status {
      margin-top: 20px;
      padding: 16px;
      background: #f4f7fb;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>PayPal JS SDK v6 Vanilla Demo</h1>
      <p>docs.paypal.ai の vanilla JS SDK v6 パターンに合わせた実装です。</p>
      <p class="amount">Amount: <strong>$10.00 USD</strong></p>

      <paypal-button hidden></paypal-button>

      <div id="status">Loading...</div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");

    function setStatus(message) {
      console.log(message);
      statusEl.textContent = message;
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });
    }

    async function createOrder() {
      setStatus("Creating order on server...");

      const response = await fetch("/api/orders", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        }
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Order creation failed");
      }

      const orderId = data.id || data.orderId;

      if (!orderId) {
        throw new Error("Server did not return an order ID");
      }

      setStatus(`Order created: ${orderId}`);

      // JS SDK v6 requires this exact shape.
      return { orderId };
    }

    async function captureOrder(orderId) {
      setStatus(`Capturing order ${orderId}...`);

      const response = await fetch(`/api/orders/${orderId}/capture`, {
        method: "POST"
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Capture failed");
      }

      return data;
    }

    async function init() {
      try {
        setStatus("Loading config from server...");

        const configResponse = await fetch("/api/config");
        const config = await configResponse.json();

        if (!configResponse.ok) {
          throw new Error(config.error || "Failed to load config");
        }

        setStatus("Loading PayPal JS SDK v6...");
        await loadScript(config.sdkUrl);

        setStatus("Initializing PayPal SDK v6...");

        const sdkInstance = await window.paypal.createInstance({
          clientId: config.clientId,
          components: ["paypal-payments"],
          pageType: "checkout"
        });

        const paymentSession = sdkInstance.createPayPalOneTimePaymentSession({
          async onApprove(data) {
            console.log("onApprove:", data);
            const orderId = data.orderId;

            if (!orderId) {
              throw new Error("PayPal approval did not include an orderId");
            }

            const result = await captureOrder(orderId);
            console.log("capture result:", result);

            setStatus(`Payment captured successfully.\n\nOrder ID: ${orderId}`);
          },

          onCancel(data) {
            console.log("onCancel:", data);
            setStatus("Payment cancelled.");
          },

          onError(error) {
            console.error("onError:", error);
            setStatus("Payment error. Check browser console and Render logs.");
          }
        });

        const paypalButton = document.querySelector("paypal-button");
        paypalButton.removeAttribute("hidden");

        paypalButton.addEventListener("click", async () => {
          try {
            // Important:
            // v6 expects createOrder() as the second argument to start().
            // The promise must resolve to { orderId: "..." }.
            await paymentSession.start(
              { presentationMode: "auto" },
              createOrder()
            );
          } catch (error) {
            console.error("paymentSession.start error:", error);
            setStatus(error.message || "Payment start failed");
          }
        });

        setStatus("PayPal SDK ready. Click the PayPal button.");
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Initialization failed");
      }
    }

    init();
  </script>
</body>
</html>
